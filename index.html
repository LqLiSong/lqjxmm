    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .time {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .password {
            font-size: 20px;
            font-weight: bold;
            color: #2980b9;
        }
        .auth-code-input {
            display: none;
            margin-bottom: 20px;
        }
        .auth-code-input input {
            width: calc(100% - 120px); /* 调整宽度 */
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
        }
        .auth-code-input button {
            padding: 10px 20px;
            background-color: #2980b9;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .auth-code-input button:hover {
            background-color: #2c3e50;
        }
        .debug-info {
            font-size: 14px;
            color: #bdc3c7;
            margin-top: 20px;
        }
    </style>
