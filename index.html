<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>炉桥驾校</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>炉桥驾校</h1>
        <div id="loading">请稍等...</div>
        <div id="time-period" class="time-period"></div>
        <div id="practice-time" class="practice-time" style="display: none;"></div>
        <div id="password-display" class="password-display" style="display: none;">
            <div id="password-text"></div>
            <div id="auth-input" class="auth-input" style="display: none;">
                <input type="text" id="auth-code" placeholder="请输入授权码">
                <button onclick="verifyAuthCode()">确认</button>
            </div>
        </div>
        <div id="notice" class="notice" style="display: none;">练车时间开始前 5 分钟会显示密码，到时间未显示，请手动刷新网页</div>
        <div id="error-message" class="error-message"></div>
    </div>
    <script type="module" src="index.min.js"></script>
</body>
</html>
