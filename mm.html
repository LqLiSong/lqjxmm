<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>管理后台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>管理后台</h1>
        
        <div id="login-section" class="login-section">
            <input type="password" id="admin-password" placeholder="请输入管理员密码">
            <button onclick="login()">验证</button>
            <div id="login-error" class="error-message"></div>
        </div>

        <div id="admin-panel" class="admin-panel" style="display: none;">
            <div class="password-section">
                <h2>密码信息</h2>
                <div class="password-info">
                    <div class="password-item">
                        <span>昨日密码：</span>
                        <span id="yesterday-password">-</span>
                        <span id="yesterday-auth-code">-</span>
                    </div>
                    <div class="password-item">
                        <span>今日密码：</span>
                        <span id="today-password">-</span>
                        <span id="today-auth-code">-</span>
                    </div>
                    <div class="password-item">
                        <span>明日密码：</span>
                        <span id="tomorrow-password">-</span>
                        <span id="tomorrow-auth-code">-</span>
                    </div>
                </div>
            </div>

            <div class="time-settings-section">
                <h2 class="collapsible-header" onclick="toggleTimeSettings()">
                    时间段设置 <span id="toggle-icon">▼</span>
                </h2>
                <div id="time-settings-content" class="time-settings" style="display: none;">
                    <div class="time-period-setting">
                        <label>早上：</label>
                        <input type="time" id="morning-start">
                        <span>-</span>
                        <input type="time" id="morning-end">
                    </div>
                    <div class="time-period-setting">
                        <label>上午：</label>
                        <input type="time" id="forenoon-start">
                        <span>-</span>
                        <input type="time" id="forenoon-end">
                    </div>
                    <div class="time-period-setting">
                        <label>中午：</label>
                        <input type="time" id="noon-start">
                        <span>-</span>
                        <input type="time" id="noon-end">
                    </div>
                    <div class="time-period-setting">
                        <label>下午：</label>
                        <input type="time" id="afternoon-start">
                        <span>-</span>
                        <input type="time" id="afternoon-end">
                    </div>
                    <div class="time-period-setting">
                        <label>晚上：</label>
                        <input type="time" id="evening-start">
                        <span>-</span>
                        <input type="time" id="evening-end">
                    </div>
                    <button onclick="saveTimeSettings()" class="save-button">保存设置</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="mm.min.js"></script>
</body>
</html>
